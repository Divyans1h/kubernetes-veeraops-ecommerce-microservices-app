apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 313476888052.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:639d10b006aa575493763954ed94952e6d2f78f8
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: googlemusic-service
  labels:
    app: googlemusic
spec:
  type: ClusterIP
  selector:
    app: googlemusic
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
